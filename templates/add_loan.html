<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Loan - {{ member.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Load saved theme
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (document.body) {
                document.body.setAttribute('data-theme', savedTheme);
            } else {
                window.addEventListener('DOMContentLoaded', function() {
                    document.body.setAttribute('data-theme', savedTheme);
                });
            }
        })();
    </script>
</head>
<body>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <strong>{{ message }}</strong>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <a href="{{ url_for('view_member', member_id=member.member_id) }}" class="btn btn-link mb-3">
            <i class="fas fa-arrow-left"></i> Back to Profile
        </a>

        <div class="form-container">
            <div class="form-card">
                <h2><i class="fas fa-hand-holding-usd"></i> Add Loan Entry</h2>
                <div class="alert alert-info mb-4" style="background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border-left: 5px solid #f59e0b;">
                    <strong><i class="fas fa-user"></i> Member:</strong> {{ member.name }} (ID: {{ member.member_id }})
                </div>
                
                <form method="POST" action="{{ url_for('add_loan', member_id=member.member_id) }}">
    </div>
</body>
</html>
